<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SinisVial ⚠️</title>

  <!-- Materialize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="blue darken-3">
  <div class="nav-wrapper container">
    <a href="#" class="brand-logo">SinisVial ⚠️</a>

    <ul class="right hide-on-med-and-down">
      <li><div id="geocoder-navbar"></div></li>
      <li><a href="#reportar" class="modal-trigger">Reportar</a></li>
      <li><a href="#emergencia" class="modal-trigger">Emergencia</a></li>
    </ul>
  </div>
</nav>

<div id="map"></div>

<!-- MODAL REPORTAR -->
<div id="reportar" class="modal">
  <div class="modal-content">

    <h4>Reportar incidente</h4>

    <div class="input-field">
      <input type="text" id="incidente-descripcion">
      <label for="incidente-descripcion">Descripción del incidente</label>
    </div>

    <div class="input-field">
      <select id="tipo-marcador">
        <option value="danger">Peligro</option>
        <option value="caution">Precaución</option>
        <option value="accident">Accidente</option>
      </select>
      <label>Tipo de incidente</label>
    </div>

    <button class="btn blue waves-effect waves-light" id="confirmar-reporte">
      Confirmar
    </button>

  </div>
</div>

<!-- MODAL EMERGENCIA -->
<div id="emergencia" class="modal">
  <div class="modal-content center-align">
    <h4>Emergencia</h4>

    <p>Contacta rápidamente a emergencias.</p>

    <button class="btn red" id="llamar-emergencia">
      Llamar 123
    </button>
  </div>
</div>
</html>
