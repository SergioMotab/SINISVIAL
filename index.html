<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SinisVial ⚠️</title>

  <!-- Materialize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #map {
      height: calc(100vh - 64px);
      width: 100%;
    }

    /* Geocoder en navbar */
    #geocoder-navbar {
      width: 320px;
      margin-top: 10px;
    }

    .leaflet-control-geocoder {
      width: 100% !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .leaflet-control-geocoder-form input {
      background: white !important;
      border-radius: 20px !important;
      padding-left: 15px !important;
      height: 36px !important;
    }

    .leaflet-control-geocoder-alternatives {
      max-height: 300px;
      overflow-y: auto;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="blue darken-3">
  <div class="nav-wrapper">
    <a href="#" class="brand-logo" style="margin-left:10px;">SinisVial ⚠️</a>

    <ul class="right hide-on-med-and-down">
      <li>
        <div id="geocoder-navbar"></div>
      </li>

      <li><a href="#reportar" class="modal-trigger">Reportar</a></li>
      <li><a href="#markers-list" class="modal-trigger">Marcadores</a></li>
      <li><a href="#emergencia" class="modal-trigger">Emergencia</a></li>
    </ul>
  </div>
</nav>

<div id="map"></div>

<!-- MODAL REPORTAR -->
<div id="reportar" class="modal">
  <div class="modal-content">
    <h4>Reportar Incidente</h4>

    <div class="input-field">
      <input type="text" id="incidente-descripcion">
      <label>Descripción</label>
    </div>

    <div class="input-field">
      <select id="tipo-marcador">
        <option value="danger">Peligro</option>
        <option value="caution">Precaución</option>
        <option value="accident">Accidente</option>
      </select>
      <label>Tipo</label>
    </div>

    <button class="btn blue" id="confirmar-reporte">Confirmar</button>
  </div>
</div>

<!-- LISTA -->
<div id="markers-list" class="modal">
  <div class="modal-content">
    <h4>Marcadores</h4>
    <ul id="markers-list-content"></ul>
  </div>
</div>

<!-- EMERGENCIA -->
<div id="emergencia" class="modal">
  <div class="modal-content">
    <h4>Emergencia</h4>
    <button class="btn red" id="llamar-emergencia">Llamar 123</button>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="script.js"></script>

</body>
</html>
